name: Rust Windows Build

on:
  push:
    branches: [ "main", "master" ] # 当你提交代码到主分支时触发
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行

jobs:
  build:
    runs-on: windows-latest # 使用 GitHub 提供的最新 Windows 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM (Clang)
        run: choco install llvm -y # 使用 Chocolatey 自动安装并配置 LLVM

      - name: Set Environment Variables
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $GITHUB_ENV
          echo "PATH=C:\Program Files\LLVM\bin;$env:PATH" >> $GITHUB_ENV

      - name: Build Release
        run: cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ironclaw-windows-exe
          path: target/release/*.exe # 自动寻找生成的 exe 文件